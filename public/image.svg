<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Dark background circle -->
  <circle cx="60" cy="60" r="58" fill="#0b1220" stroke="#38bdf8" stroke-width="2"/>

  <!-- Lens outer ring -->
  <circle cx="60" cy="52" r="28" stroke="#38bdf8" stroke-width="3" fill="none" opacity="0.8"/>
  <!-- Lens inner -->
  <circle cx="60" cy="52" r="18" fill="#38bdf8" opacity="0.15"/>
  <circle cx="60" cy="52" r="10" fill="#38bdf8" opacity="0.4"/>
  <circle cx="60" cy="52" r="4"  fill="#38bdf8"/>

  <!-- Lens shine -->
  <circle cx="53" cy="45" r="3" fill="white" opacity="0.3"/>

  <!-- Lens handle -->
  <line x1="81" y1="73" x2="95" y2="90" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>

  <!-- Graduation cap -->
  <polygon points="60,22 78,32 60,42 42,32" fill="#02c39a" opacity="0.9"/>
  <rect x="74" y="32" width="3" height="12" rx="1.5" fill="#02c39a" opacity="0.9"/>
  <circle cx="75.5" cy="45" r="2.5" fill="#02c39a"/>

  <!-- Bottom text bar -->
  <rect x="20" y="88" width="80" height="16" rx="8" fill="#38bdf8" opacity="0.15"/>
  <text x="60" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#38bdf8" letter-spacing="2">EDULENS</text>
</svg>
